<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wingbound</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
  }
  canvas { display: block; image-rendering: pixelated; border: 4px solid #5c3317; box-shadow: 0 0 0 4px #8b4513, 0 8px 32px rgba(0,0,0,0.6); }
</style>
</head>
<body>
<canvas id="c" width="400" height="600"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 400, H = 600;

// Day / Night — starts from system time, player can toggle
const hour = new Date().getHours();
let IS_NIGHT = hour >= 20 || hour < 6;

function THEME() {
  return IS_NIGHT ? {
    sky:'#060c1a', cloudMain:'#2a3a60', cloudShad:'#1e2e50',
    grassTop:'#2a5010', grassBlade:'#3a7020',
    groundTop:'#c8881a', groundMid:'#a86c14', groundBot:'#7a4a10',
    pipeLight:'#4a8432', pipeMid:'#2e6820', pipeDark:'#1a4c0c', pipeCap:'#3a7428',
    scoreCol:'#ffe080',
  } : {
    sky:'#5c94fc', cloudMain:'#ffffff', cloudShad:'#e0e0e0',
    grassTop:'#5ab030', grassBlade:'#72c442',
    groundTop:'#e8a020', groundMid:'#c67c1c', groundBot:'#8b5014',
    pipeLight:'#72c442', pipeMid:'#4a9c1e', pipeDark:'#2e6e08', pipeCap:'#5ab030',
    scoreCol:'#ffffff',
  };
}

// Constants
const GROUND_H = 70, GROUND_Y = H - GROUND_H;
const PIPE_W = 58, PIPE_GAP = 148, PIPE_SPEED = 2.5;
const GRAVITY = 0.38, JUMP = -7;

// State
let state = 'birdSelect';
let score = 0, topScores = [0, 0, 0];
let pipes = [], pipeTimer = 0;
let groundScroll = 0, cloudScroll = 0;
let selectedBird = 0;

// Bird defs
const BIRDS = [
  { name:'MARIO',  body:'#e03020', belly:'#f8d0a0', cap:'#e03020',  capD:'#c02010', w1:'#e87000', w2:'#ffa030', beak:'#f8a000' },
  { name:'LUIGI',  body:'#2a8a2a', belly:'#f8d0a0', cap:'#2a8a2a',  capD:'#1a6a1a', w1:'#1a6a00', w2:'#3aaa20', beak:'#f8a000' },
  { name:'TOAD',   body:'#f0f0f0', belly:'#f8d0a0', cap:null,       capD:null,      w1:'#cc2222', w2:'#ee4444', beak:'#f8a000', toad:true },
  { name:'YOSHI',  body:'#2ac840', belly:'#d0f0a0', cap:null,       capD:null,      w1:'#1a9030', w2:'#3ae050', beak:'#f8c000', yoshi:true },
  { name:'BOWSER', body:'#c8a020', belly:'#f0d080', cap:null,       capD:null,      w1:'#c84010', w2:'#e86020', beak:'#d06000', bowser:true },
  { name:'PINKY',  body:'#ff6eb0', belly:'#ffe0f0', cap:'#ff3d9a',  capD:'#c0006a', w1:'#ff3d9a', w2:'#ff9dd0', beak:'#ff6020' },
  { name:'VIOLET', body:'#8844cc', belly:'#ddc0ff', cap:'#6622aa',  capD:'#441188', w1:'#6622aa', w2:'#aa66ee', beak:'#cc44aa' },
];

const bird = { x:100, y:260, vy:0, r:14, rot:0, wingUp:false, wingT:0 };
function resetBird() { bird.y=260; bird.vy=0; bird.rot=0; bird.wingUp=false; bird.wingT=0; }

// Stars
const stars = Array.from({length:80}, () => ({
  x: Math.random()*W, y: Math.random()*GROUND_Y*0.85,
  r: Math.random()*1.4+0.3, t: Math.random()*Math.PI*2
}));

const clouds = [{x:60,y:65,w:80},{x:220,y:90,w:60},{x:340,y:50,w:90},{x:130,y:130,w:50}];

// Scores
function addScore(s) {
  topScores.push(s); topScores.sort((a,b)=>b-a); topScores=topScores.slice(0,3);
}

// ---- Utilities ----
function pxText(txt, x, y, size, color, shadow) {
  ctx.font = size+'px "Press Start 2P"';
  if (shadow) { ctx.fillStyle=shadow; ctx.fillText(txt, x+2, y+2); }
  ctx.fillStyle = color; ctx.fillText(txt, x, y);
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

// ---- Draw: Sky ----
function drawSky() {
  if (IS_NIGHT) {
    const g = ctx.createLinearGradient(0,0,0,GROUND_Y);
    g.addColorStop(0,'#060c1a'); g.addColorStop(1,'#1a2a50');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,GROUND_Y);
    stars.forEach(s => {
      s.t+=0.03;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,245,200,${0.5+0.5*Math.sin(s.t)})`; ctx.fill();
    });
    ctx.beginPath(); ctx.arc(330,65,26,0,Math.PI*2); ctx.fillStyle='#fff8d0'; ctx.fill();
    ctx.beginPath(); ctx.arc(340,58,22,0,Math.PI*2); ctx.fillStyle='#060c1a'; ctx.fill();
  } else {
    ctx.fillStyle=THEME().sky; ctx.fillRect(0,0,W,GROUND_Y);
  }
}

// ---- Draw: Clouds ----
function drawCloud(x,y,w) {
  const h=w*0.5;
  ctx.fillStyle=THEME().cloudMain;
  ctx.beginPath(); ctx.arc(x+w*0.25,y+h*0.5,h*0.55,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+w*0.55,y+h*0.3,h*0.65,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+w*0.8,y+h*0.5,h*0.45,0,Math.PI*2); ctx.fill();
  ctx.fillRect(x+h*0.2,y+h*0.5,w-h*0.4,h*0.55);
  ctx.fillStyle=THEME().cloudShad; ctx.fillRect(x+h*0.2,y+h*0.8,w-h*0.4,h*0.25);
}
function drawClouds() {
  if (state==='playing') cloudScroll+=0.4;
  clouds.forEach(c => {
    const cx=((c.x-cloudScroll%(W+c.w))+(W+c.w)*2)%(W+c.w)-c.w;
    drawCloud(cx,c.y,c.w);
  });
}

// ---- Draw: Ground ----
function drawGround() {
  if (state==='playing') groundScroll=(groundScroll+PIPE_SPEED)%32;
  ctx.fillStyle=THEME().grassTop; ctx.fillRect(0,GROUND_Y,W,6);
  ctx.fillStyle=THEME().grassBlade;
  for (let x=-groundScroll; x<W; x+=8) ctx.fillRect(x,GROUND_Y-4,4,6);
  ctx.fillStyle=THEME().groundTop; ctx.fillRect(0,GROUND_Y+6,W,22);
  ctx.fillStyle=THEME().groundMid; ctx.fillRect(0,GROUND_Y+28,W,24);
  ctx.fillStyle=THEME().groundBot; ctx.fillRect(0,GROUND_Y+52,W,18);
  ctx.fillStyle=THEME().groundBot;
  for (let x=-groundScroll; x<W; x+=32) ctx.fillRect(x,GROUND_Y+6,2,28);
  ctx.fillRect(0,GROUND_Y+20,W,2);
}

// ---- Draw: Pipes ----
function spawnPipe() {
  pipes.push({ x:W+10, gapY:120+Math.random()*(GROUND_Y-120-PIPE_GAP-20), passed:false });
}
function drawPipe(p) {
  const topH=p.gapY, botY=p.gapY+PIPE_GAP, botH=GROUND_Y-botY;
  const cW=PIPE_W+12, cH=20, cX=p.x-6;
  function tube(x,y,w,h) {
    if(h<=0)return;
    ctx.fillStyle=THEME().pipeDark; ctx.fillRect(x,y,w,h);
    ctx.fillStyle=THEME().pipeMid;  ctx.fillRect(x+4,y,w-8,h);
    ctx.fillStyle=THEME().pipeLight;ctx.fillRect(x+8,y,10,h);
    ctx.fillStyle=THEME().pipeDark; ctx.fillRect(x+w-6,y,6,h);
  }
  function cap(x,y,w,h) {
    ctx.fillStyle=THEME().pipeDark; ctx.fillRect(x,y,w,h);
    ctx.fillStyle=THEME().pipeCap;  ctx.fillRect(x+4,y,w-8,h);
    ctx.fillStyle=THEME().pipeLight;ctx.fillRect(x+8,y+3,14,h-6);
    ctx.fillStyle=THEME().pipeDark; ctx.fillRect(x+w-8,y,8,h);
  }
  tube(p.x,0,PIPE_W,topH-cH); cap(cX,topH-cH,cW,cH);
  cap(cX,botY,cW,cH); tube(p.x,botY+cH,PIPE_W,botH-cH);
}

// ---- Draw: Bird ----
function drawBirdAt(def, cx, cy, r, rotation, wingUp) {
  ctx.save(); ctx.translate(cx,cy);
  if (rotation) ctx.rotate(rotation);
  const wY = wingUp ? -7 : 4;

  // Wing
  ctx.fillStyle=def.w1; ctx.beginPath(); ctx.ellipse(-4,wY,9,5,-0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=def.w2; ctx.beginPath(); ctx.ellipse(-5,wY-1,6,3,-0.3,0,Math.PI*2); ctx.fill();

  // Body
  ctx.fillStyle=def.body; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=def.belly; ctx.beginPath(); ctx.ellipse(3,3,r*0.55,r*0.45,0.2,0,Math.PI*2); ctx.fill();

  // Special heads
  if (def.toad) {
    ctx.fillStyle='#e82020';
    ctx.beginPath(); ctx.arc(0,-r*0.4,r*0.9,Math.PI,0); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(-4,-r*0.5,3.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-r*0.3,3,0,Math.PI*2); ctx.fill();
  } else if (def.yoshi) {
    ctx.fillStyle='#f0c080'; ctx.beginPath(); ctx.ellipse(r*0.5,3,8,6,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#e08050';
    ctx.beginPath(); ctx.arc(r*0.5+2,3,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(r*0.5-2,3,2,0,Math.PI*2); ctx.fill();
  } else if (def.bowser) {
    ctx.fillStyle='#508020'; ctx.beginPath(); ctx.arc(0,0,r*0.7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=def.body; ctx.beginPath(); ctx.arc(0,0,r*0.4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#e8c040';
    for (let i=0;i<5;i++) {
      const a=(i/5)*Math.PI*2-Math.PI/2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);
      ctx.lineTo(Math.cos(a-0.2)*(r+5),Math.sin(a-0.2)*(r+5));
      ctx.lineTo(Math.cos(a+0.2)*(r+5),Math.sin(a+0.2)*(r+5));
      ctx.closePath(); ctx.fill();
    }
  } else if (def.cap) {
    ctx.fillStyle=def.cap;
    ctx.fillRect(-r*0.3,-r-4,r*1.1,7); ctx.fillRect(-r*0.7,-r+1,r*1.6,5);
    ctx.fillStyle=def.capD; ctx.fillRect(-r*0.7,-r+3,r*1.6,3);
  }

  // Eye
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(5,-2,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a1a1a'; ctx.beginPath(); ctx.arc(6,-2,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(7,-3,1,0,Math.PI*2); ctx.fill();
  // Beak
  ctx.fillStyle=def.beak;
  ctx.beginPath(); ctx.moveTo(r-2,2); ctx.lineTo(r+8,4); ctx.lineTo(r-2,7); ctx.closePath(); ctx.fill();
  ctx.restore();
}

let selectWingUp=false, selectWingT=0;

function drawBird() {
  bird.wingT++;
  if(bird.wingT>8){bird.wingUp=!bird.wingUp;bird.wingT=0;}
  const tr=Math.max(-0.4,Math.min(Math.PI*0.45,bird.vy*0.065));
  bird.rot+=(tr-bird.rot)*0.2;
  drawBirdAt(BIRDS[selectedBird],bird.x,bird.y,bird.r,bird.rot,bird.wingUp);
}

// ---- Draw: HUD ----
function drawHUD() {
  if(state==='playing') pxText(String(score).padStart(5,'0'),W/2-44,38,16,THEME().scoreCol,'#000000');
}

// ---- Card layout helper ----
function cardPos(i) {
  const cW=72,cH=86,gap=8;
  const row=i<4?0:1, idx=i<4?i:i-4, count=i<4?4:3;
  const sx=(W-(count*cW+(count-1)*gap))/2;
  return {cx:sx+idx*(cW+gap), cy:row===0?82:178, cW, cH};
}

// ---- Bird Select Screen ----
function drawBirdSelect() {
  drawSky(); drawClouds(); drawGround();
  selectWingT++;
  if(selectWingT>10){selectWingUp=!selectWingUp;selectWingT=0;}

  pxText('WINGBOUND',W/2-90,46,16,'#ffffff','#000000');
  pxText('CHOOSE YOUR BIRD',W/2-112,68,9,'#ffdd00','#000000');

  BIRDS.forEach((def,i) => {
    const {cx,cy,cW,cH}=cardPos(i);
    const sel=i===selectedBird;
    roundRect(cx,cy,cW,cH,6);
    ctx.fillStyle=sel?'rgba(255,210,60,0.88)':'rgba(0,0,0,0.38)'; ctx.fill();
    ctx.strokeStyle=sel?'#ffffff':'rgba(255,255,255,0.2)';
    ctx.lineWidth=sel?2:1;
    roundRect(cx,cy,cW,cH,6); ctx.stroke();

    drawBirdAt(def,cx+cW/2,cy+40,14,0,selectWingUp);
    pxText(def.name,cx+4,cy+cH-8,5,sel?'#3a1a00':'#ffffff',sel?null:'#000000');

    if(sel){
      ctx.fillStyle='#ff3020';
      ctx.beginPath();
      ctx.moveTo(cx+cW/2-6,cy-11); ctx.lineTo(cx+cW/2+6,cy-11); ctx.lineTo(cx+cW/2,cy-3);
      ctx.closePath(); ctx.fill();
    }
  });

  pxText('< >  SELECT    SPACE  START',W/2-136,278,7,'#ffffff','#000000');

  pxText('TOP SCORES',W/2-68,308,9,'#ffdd00','#000000');
  topScores.forEach((s,i)=>{
    const medal=['#ffd700','#c0c0c0','#cd7f32'][i];
    pxText('#'+(i+1),W/2-80,330+i*22,8,medal,'#000000');
    pxText(String(s).padStart(5,'0'),W/2-20,330+i*22,8,'#ffffff','#000000');
  });

  const tag=IS_NIGHT?'NIGHT MODE':'DAY MODE';
  pxText(tag,W/2-56,404,8,IS_NIGHT?'#aaccff':'#ffee88','#000000');

  // Day/night toggle button
  const btnLabel = IS_NIGHT ? '> DAY MODE' : '> NIGHT MODE';
  const btnBg    = IS_NIGHT ? 'rgba(255,220,60,0.88)' : 'rgba(20,40,140,0.85)';
  const btnFg    = IS_NIGHT ? '#3a2a00' : '#aaccff';
  drawButton(W/2-80, 420, 160, 30, btnLabel, btnBg, btnFg);
}

// ---- Dead Screen ----
function drawButton(x,y,w,h,label,bg,fg) {
  roundRect(x,y,w,h,6); ctx.fillStyle=bg; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1.5;
  roundRect(x,y,w,h,6); ctx.stroke();
  ctx.font='8px "Press Start 2P"';
  const tw=ctx.measureText(label).width;
  pxText(label,x+(w-tw)/2,y+h/2+4,8,fg,'rgba(0,0,0,0.5)');
}

function drawDeadScreen() {
  ctx.fillStyle='rgba(0,0,0,0.52)'; ctx.fillRect(0,0,W,H);
  roundRect(40,140,320,300,10);
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1.5;
  roundRect(40,140,320,300,10); ctx.stroke();

  pxText('GAME OVER',56,190,16,'#ff3020','#000000');
  pxText('SCORE',68,222,9,'#ffffff','#000000');
  pxText(String(score).padStart(5,'0'),230,222,9,'#ffdd00','#000000');

  pxText('TOP SCORES',68,250,8,'#cccccc','#000000');
  topScores.forEach((s,i)=>{
    const medal=['#ffd700','#c0c0c0','#cd7f32'][i];
    pxText('#'+(i+1),68,272+i*22,8,medal,'#000000');
    pxText(String(s).padStart(5,'0'),128,272+i*22,8,'#ffffff','#000000');
  });

  drawButton(55,356,130,36,'RETRY','rgba(40,160,40,0.85)','#ffffff');
  drawButton(205,356,145,36,'CHANGE BIRD','rgba(30,100,200,0.85)','#ffffff');
  pxText('SPACE = RETRY',108,412,7,'rgba(255,255,255,0.5)',null);
}

// ---- Game logic ----
function update() {
  if(state!=='playing') return;
  bird.vy+=GRAVITY; bird.y+=bird.vy;
  pipeTimer++;
  if(pipeTimer>=90){spawnPipe();pipeTimer=0;}
  pipes.forEach(p=>{
    p.x-=PIPE_SPEED;
    if(!p.passed&&p.x+PIPE_W<bird.x){p.passed=true;score++;}
  });
  pipes=pipes.filter(p=>p.x+PIPE_W>-20);
  if(bird.y+bird.r>=GROUND_Y||bird.y-bird.r<=0){die();return;}
  for(const p of pipes){
    const cX=p.x-6,cW=PIPE_W+12;
    if(bird.x+bird.r>cX&&bird.x-bird.r<cX+cW){
      if(bird.y-bird.r<p.gapY||bird.y+bird.r>p.gapY+PIPE_GAP){die();return;}
    }
  }
}

function die() {
  if(state!=='playing')return;
  state='dead'; addScore(score);
}

function startGame() {
  state='playing'; resetBird();
  pipes=[]; pipeTimer=0; score=0; bird.vy=JUMP;
}

function goToBirdSelect() {
  state='birdSelect'; pipes=[]; pipeTimer=0; score=0; resetBird();
}

function tap() {
  if(state==='birdSelect'){startGame();}
  else if(state==='playing'){bird.vy=JUMP;}
  else if(state==='dead'){
    state='playing'; resetBird(); pipes=[]; pipeTimer=0; score=0; bird.vy=JUMP;
  }
}

// ---- Input ----
document.addEventListener('keydown', e=>{
  if(state==='birdSelect'){
    if(e.key==='ArrowLeft'){selectedBird=(selectedBird-1+BIRDS.length)%BIRDS.length;return;}
    if(e.key==='ArrowRight'){selectedBird=(selectedBird+1)%BIRDS.length;return;}
  }
  if(e.code==='Space'){e.preventDefault();tap();}
});

function handleClick(mx,my){
  if(state==='birdSelect'){
    // Day/night toggle button: x=W/2-80=120, y=420, w=160, h=30
    if(mx>=120&&mx<=280&&my>=420&&my<=450){ IS_NIGHT=!IS_NIGHT; return; }
    let hit=false;
    BIRDS.forEach((_,i)=>{
      const{cx,cy,cW,cH}=cardPos(i);
      if(mx>=cx&&mx<=cx+cW&&my>=cy&&my<=cy+cH){
        if(selectedBird===i) startGame(); else selectedBird=i;
        hit=true;
      }
    });
    if(!hit) tap();
  } else if(state==='dead'){
    if(mx>=55&&mx<=185&&my>=356&&my<=392){tap();return;}
    if(mx>=205&&mx<=350&&my>=356&&my<=392){goToBirdSelect();return;}
    tap();
  } else {
    tap();
  }
}

canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  handleClick((e.clientX-r.left)*(W/r.width),(e.clientY-r.top)*(H/r.height));
});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  handleClick((e.touches[0].clientX-r.left)*(W/r.width),(e.touches[0].clientY-r.top)*(H/r.height));
});

// ---- Main loop ----
function loop() {
  update();
  if(state==='birdSelect'){
    drawBirdSelect();
  } else {
    drawSky(); drawClouds();
    pipes.forEach(drawPipe);
    drawGround(); drawBird(); drawHUD();
    if(state==='dead') drawDeadScreen();
  }
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
